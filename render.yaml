services:
  - type: web
    name: cloud-log-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: starter
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: CLIENT_URL
        fromService:
          name: cloud-log-frontend
          type: web
          property: host
    healthCheckPath: /api/health

  - type: web
    name: cloud-log-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          name: cloud-log-backend
          type: web
          property: host
